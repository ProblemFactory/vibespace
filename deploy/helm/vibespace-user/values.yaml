# One VibeSpace instance per user (one Helm release = one user).
#   helm install u-<user> . --set user=<user> --set password=<pw> --set domain=<your-domain>
# All values below are PLACEHOLDERS — supply your own via --set or a private
# values file. Nothing here is environment-specific.
user: ""                       # REQUIRED — the user's short name (drives host + labels)
password: ""                   # REQUIRED — VIBESPACE_PASSWORD

image:
  repository: ghcr.io/problemfactory/vibespace   # the public VibeSpace image
  tag: "3.3.0"
  pullPolicy: IfNotPresent
  imagePullSecret: ""          # set if the registry is private

# Hostname = <user>.<domain> (or override `host` entirely). Supply your own domain.
domain: "vibespace.example.com"
host: ""

ingress:
  className: nginx             # your ingress controller's class (nginx / traefik / …)
  tls: true
  # Option A (preferred): reference a pre-issued WILDCARD cert secret you created
  # once for *.<domain> (a wildcard REQUIRES a DNS-01 issuer) — adding a user then
  # needs no per-host ACME issuance.
  wildcardCertSecret: ""
  # Option B: let cert-manager issue a per-host cert via this issuer (used only
  # when wildcardCertSecret is empty).
  clusterIssuer: ""

storage:
  className: ""                # your RWO StorageClass (e.g. an RBD/CSI class)
  size: 100Gi                  # thin-provisioned per user
  # Point the pod at a PVC you created out-of-band instead of the chart's own
  # (e.g. after migrating home to a different StorageClass). When set, the
  # chart does NOT create its PVC — the named claim must already exist.
  existingClaim: ""

resources:
  requests: { cpu: "1", memory: "4Gi" }
  limits:   { cpu: "8", memory: "32Gi" }

# Schedule onto whatever nodes you want VibeSpace pods on.
nodeSelector: {}
tolerations: []

# Clerk SSO (optional): setting publishableKey puts the instance behind Clerk
# sign-in (password auth still works alongside if set). allowedEmails is a
# comma list — "@example.com" entries allow a whole domain; EMPTY rejects
# everyone (each per-user instance must name its owner). The Clerk session
# token must carry an email claim — in the Clerk dashboard add
#   {"email": "{{user.primary_email_address}}"}
# to Sessions → Customize session token (or a JWT template named "vibespace").
clerk:
  publishableKey: ""
  allowedEmails: ""

# Personal S3 space auto-import (optional): when ALL of endpoint/bucket/
# accessKey are set, the instance imports them ONCE on first boot as a normal
# mount named "My storage" (VIBESPACE_S3_* env → Mounts UI; needs fuse.enabled
# for the actual mount). Provision per-user credentials on your object store
# and pass them here.
s3:
  endpoint: ""
  bucket: ""
  prefix: ""
  accessKey: ""
  secretKey: ""

# All-flash CephFS "My storage" (native kernel mount, per-user quota enforced
# on the CephFS subdir). REPLACES the S3 "My storage" when both are set.
# Requires the same securityContext as fuse (SYS_ADMIN + AppArmor Unconfined)
# + passwordless sudo (in the image). The scoped cephx key is minted with
# `ceph fs authorize <fs> client.<user> <path> rw`.
cephfs:
  mons: ""       # comma list, e.g. "10.0.0.1,10.0.0.2,10.0.0.3"
  fsName: cephfs
  path: ""       # the per-user subtree, e.g. "/vibespace/<user>"
  user: ""       # scoped cephx client name (without the "client." prefix)
  secret: ""     # the cephx key (base64, from `ceph auth get-key client.<user>`)

# /dev/fuse for in-container rclone mounts (Storage/Mounts UI). Requires a
# fuse device plugin on the cluster exposing the resource named below
# (a DaemonSet like fuse-device-plugin advertising github.com/fuse).
fuse:
  enabled: false
  resource: "github.com/fuse"

# Fleet telemetry (optional). forwardUrl/forwardToken make THIS instance ship
# its anonymous diagnostics batches (error names/stacks/metrics — never
# content) to a central collector; ingestToken turns THIS instance INTO the
# collector (enables POST /api/telemetry/ingest + the Fleet section in its
# ⚙ → Diagnostics report). Point forwardUrl at
#   https://<collector-host>/api/telemetry/ingest
# and use ONE shared token as both the collector's ingestToken and every
# sender's forwardToken.
telemetry:
  forwardUrl: ""
  forwardToken: ""
  ingestToken: ""

# Agent-container egress lockdown (needs a NetworkPolicy-enforcing CNI). OFF by
# default — enable once you've set the allow-lists for YOUR network.
networkPolicy:
  enabled: false
  # CIDRs the agent may reach on your internal network (e.g. object storage).
  # Everything else internal (node net, management/BMC, k8s API) is blocked;
  # public internet (minus RFC1918) is allowed for the agent's own API calls.
  allowedInternalCidrs: []     # e.g. ["10.x.y.z/32"]

# Direct CephFS subtree sharing (optional). When url+token are set, "Share a
# folder" on a CephFS My-storage row mints a path-scoped cephx key via the
# in-cluster ceph-mint service so the receiver kernel-mounts the subtree
# directly (bypassing the WebDAV proxy). Absent it, sharing uses the bridge.
cephMint:
  url: ""      # e.g. http://ceph-mint.vibespace.svc:8900
  token: ""    # shared bearer, matches ceph-mint's CEPHMINT_TOKEN

# Optional self-hosted product analytics (PostHog or compatible). Both set →
# the app serves autocapture + FULLY MASKED session recording config to clients.
posthog:
  host: ""
  key: ""

# Optional Prometheus metrics exporter on a SEPARATE (non-ingress) port,
# scraped in-cluster via the standard prometheus.io/* pod annotations.
metrics:
  enabled: false
  port: 3457

# Optional persistent ops log: server logs written to a shared (typically
# CephFS path-scoped) directory that survives pod recreation, for fleet-admin
# scanning. secretName points at a Secret with keys: mons/fsName/client/key/path
# (e.g. minted per-instance by a ceph-mint service). Empty secretName with a
# user set defaults to "u-<user>-opslog".
opslog:
  enabled: false
  secretName: ""
  dir: /var/opslog
  keepDays: 30

# Instance-default Google OAuth client (optional): used by Google Drive mounts
# (and future Gmail) when the user doesn't supply their own client — e.g. a
# company "Internal" consent-screen client so org users authorize without any
# verification and with long-lived tokens. Injected as env, never stored in
# the instance's data.
gdrive:
  # Preferred: preset list — [{key: org1, label: "My Org (internal)", clientId: "...", clientSecret: "..."}, …]
  clients: []
  # Legacy single default client (used only when clients is empty)
  clientId: ""
  clientSecret: ""
